[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules", "lib"]
solc = "0.8.19"
auto_detect_solc = true
optimizer = true
optimizer_runs = 200

# Remappings for FHE contracts
remappings = [
    "@fhenixprotocol/cofhe-contracts/=node_modules/@fhenixprotocol/cofhe-contracts/contracts/",
    "@fhenixprotocol/cofhe-mock-contracts/=node_modules/@fhenixprotocol/cofhe-mock-contracts/contracts/",
    "@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/",
]

[profile.test]
# Settings for running tests
fs_permissions = [{ access = "read", path = "./" }]
